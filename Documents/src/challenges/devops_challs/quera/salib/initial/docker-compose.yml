version: "3"

services:
  redis:
    image: "registry.gitlab.com/qio/standard/redis:latest"
    container_name: "redis"
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 1s
      timeout: 1s
      retries: 10

  fixer:
    build: .
    container_name: "fixer"
    depends_on:
      - redis
    volumes:
      - "./output.txt:/fixer/output.txt"

